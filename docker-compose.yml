version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: outvier-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: outvier
    volumes:
      - outvier_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  outvier_mongo_data:
    driver: local
